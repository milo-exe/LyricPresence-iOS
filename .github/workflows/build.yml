name: Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project LyricPresence.xcodeproj \
            -scheme LyricPresence \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Package IPA
        run: |
          APP_PATH=$(find DerivedData -name "*.app" | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/LyricPresence.app
          zip -r LyricPresence.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LyricPresence
          path: LyricPresence.ipa
          retention-days: 30

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: Unsigned IPA — sign with DXSign or similar before installing.
          prerelease: true
          files: LyricPresence.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
